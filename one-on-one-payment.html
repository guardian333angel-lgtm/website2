<!DOCTYPE html>
<html lang="en">

<body>
  <div class="cosmic-room"></div>

        <label class="subject-label">
          Your Email
          <input type="email" name="Client Email" placeholder="you@example.com" required />

        <label class="subject-label">

        </div>
        <form class="payment-request-form" action="https://formsubmit.co/guardian333angel@gmail.com" method="post" data-secure-request-form>
          <input type="hidden" name="Request Page" value="One-On-One Payment" />
          <label>
            Your Email
            <input type="email" name="Client Email" placeholder="you@example.com" required />
          </label>
          <button class="reading-button payment-request-send" type="submit">Send Request</button>
        </form>
      </section>
    </section>
  </main>

  <script src="script.js"></script>

</html>
