<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me | Zenergy Healing Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rosarivo:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="cosmic-room"></div>
  <div class="starfield" aria-hidden="true"></div>
  <header class="site-header">
    <div class="shell">
      <div class="brand"><h1>Contact Me</h1><span>Send your request directly by email.</span></div>
    </div>
  </header>

  <main class="shell contact-shell">
    <section class="panel">
      <h2>Email Guardian</h2>
      <p class="contact-intro">Use this form to send a secure message directly to guardian333angel@gmail.com.</p>

      <form class="contact-form" action="https://formsubmit.co/guardian333angel@gmail.com" method="post" data-secure-request-form>
        <label>
          Your name
          <input type="text" name="Name" placeholder="Enter your name" required />
        </label>

        <label>
          Your email
          <input type="email" name="Reply-To" placeholder="you@example.com" required />
        </label>

        <label>
          Subject
          <input type="text" name="Subject" placeholder="How can I support you?" required />
        </label>

        <label>
          Message
          <textarea name="Message" placeholder="Type your message here..." required></textarea>
        </label>

        <div class="contact-actions">
          <button class="contact-submit" type="submit">Send Secure Message</button>
          <a class="contact-secondary" href="mailto:guardian333angel@gmail.com">Email Directly</a>
        </div>
      </form>

      <p class="contact-help">If secure send fails, use the direct email button above.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
