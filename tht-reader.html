<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THT Reader | Zenergy Healing Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rosarivo:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="cosmic-room"></div>
  <div class="starfield" aria-hidden="true"></div>

  <header class="site-header">
    <div class="shell">
      <div class="brand"><h1 class="iridescent-text">THT Reader</h1></div>
    </div>
  </header>

  <main class="shell">
    <section class="panel panel-narrow-center tht-reader-panel">
      <h2 class="iridescent-text">The Holy Tablets</h2>

      <div class="pdf-reader-wrap" role="region" aria-label="THT PDF reader">
        <iframe
          class="pdf-reader-frame"
          src="https://github.com/guardian333angel-lgtm/website2/releases/download/holy-tablets-pdf-20260409/The-Holy-Tablets.pdf#view=FitH"
          title="The Holy Tablets PDF"
          loading="lazy">
        </iframe>
      </div>

      <p class="tht-reader-fallback">
        If the reader does not appear, open the PDF directly:
        <a class="link-gold" href="https://github.com/guardian333angel-lgtm/website2/releases/download/holy-tablets-pdf-20260409/The-Holy-Tablets.pdf" target="_blank" rel="noopener noreferrer">Open PDF</a>
      </p>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
