<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Detail | Zenergy Healing Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rosarivo:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="cosmic-room"></div>
  <div class="starfield" aria-hidden="true"></div>
  <header class="site-header">
    <div class="shell">
      <div class="brand"><h1>Scan Detail</h1><span>Submit your scan request.</span></div>
    </div>
  </header>

  <main class="shell reading-detail-shell">
    <section class="panel">
      <h2>Scan Detail</h2>
      <form class="reading-detail-form" action="https://formsubmit.co/guardian333angel@gmail.com" method="post" data-secure-request-form>
        <label class="subject-label">
          Subject
          <input type="text" name="Subject" required />
        </label>

        <label class="subject-label">
          Describe The Circumstance
          <textarea name="Message" placeholder="Share anything helpful for your scan."></textarea>
        </label>

        <button class="reading-send" type="submit" aria-label="Send scan request">&rarr;</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
